# Frontend-only nginx config.
# TLS and reverse-proxying are handled by the external Nginx Proxy Manager.
# This container only serves the built React SPA on port 80.

worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 512;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;
    tcp_nopush   on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.html;

        # React SPA — all unknown paths fall back to index.html
        location / {
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # Hashed assets get long-term caching
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Health check for NPM / uptime monitors
        location /ping {
            return 200 "pong\n";
            add_header Content-Type text/plain;
        }
    }
}
