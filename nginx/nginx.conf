worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Large uploads & long-running streams ───────────────────────────────
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_read_timeout 86400s;   # 24 h — required for /crowd live streams
    proxy_send_timeout 86400s;

    upstream api {
        server api:8000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect (activate once TLS cert is provisioned) ──────
    # Uncomment and set your domain; comment out the HTTP server block below.
    #
    # server {
    #     listen 80;
    #     server_name your.domain.com;
    #     return 301 https://$host$request_uri;
    # }

    # ── HTTP server (development / pre-TLS fallback) ───────────────────────
    server {
        listen 80;
        server_name _;

        # ── API + Auth: proxy to FastAPI ───────────────────────────────────
        location ~ ^/(api|auth|docs|redoc|openapi.json) {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── /crowd  WebSocket — live audio from Discord stage bots ─────────
        # Sessions stay open for up to 24 hours; timeouts set accordingly.
        location /crowd {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Frontend: serve React SPA ─────────────────────────────────────
        location / {
            root /var/www/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # ── Static assets: aggressive caching ─────────────────────────────
        location /assets/ {
            root /var/www/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── HTTPS server (activate once TLS cert is provisioned) ──────────────
    # Replace "your.domain.com" with your actual domain.
    # Certificate paths assume Certbot / Let's Encrypt.
    #
    # server {
    #     listen 443 ssl http2;
    #     server_name your.domain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # ── API + Auth ─────────────────────────────────────────────────
    #     location ~ ^/(api|auth|docs|redoc|openapi.json) {
    #         proxy_pass http://api;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
    #         proxy_http_version 1.1;
    #         proxy_set_header Connection "";
    #     }
    #
    #     # ── /crowd  WebSocket (WSS) ────────────────────────────────────
    #     location /crowd {
    #         proxy_pass http://api;
    #         proxy_http_version 1.1;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto https;
