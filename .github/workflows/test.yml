name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: sudo apt-get install -y ffmpeg

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]" fastapi uvicorn python-multipart "python-jose[cryptography]" httpx pydantic pydantic-settings aiofiles cryptography

      - name: Run unit tests (skip integration tests requiring models)
        run: pytest -m "not integration" --cov=whisperx_app --cov-report=xml -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
